            --gold-light: #f5ede0;

            --rule-strong: rgba(31, 27, 22, .2);

        }

        #v3 {
            margin-top: 100px;
            background: var(--cream);
            font-family: 'DM Sans', sans-serif;
            color: var(--ink);
        }

        #v3 .demo {
            background: var(--cream)
        }

        #v3 .arch-header {
            padding: 80px clamp(24px, 6vw, 120px) 60px;
            border-bottom: 2px solid var(--ink);
            max-width: 1200px;
            margin: 0 auto;
        }

        #v3 .arch-meta-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 24px;
            flex-wrap: wrap;
            margin-bottom: 24px
        }

        #v3 .arch-title {
            font-family: var(--cormorant);
            font-size: clamp(48px, 7vw, 96px);
            font-weight: 300;
            color: var(--ink);
            letter-spacing: -.02em;
            line-height: 1
        }

        #v3 .arch-sub {
            font-size: 12px;
            color: var(--ink-muted);
            line-height: 1.6;
            max-width: 320px;
            text-align: right
        }

        #v3 .arch-search {
            display: flex;
            align-items: center;
            border: 1px solid var(--rule-strong);
            max-width: 360px;
            margin-top: 32px;
            border-radius: 20px;
        }

        #v3 .arch-search input {
            flex: 1;
            padding: 12px 16px;
            font-family: var(--dm);
            font-size: 13px;
            color: var(--ink);
            background: transparent;
            border: none;
            outline: none
        }

        #v3 .arch-search input::placeholder {
            color: var(--ink-muted)
        }

        #v3 .arch-search-icon {
            padding: 12px 16px;
            color: var(--ink-muted)
        }

        /* Archive list */
        #v3 .arch-list {
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 80px;
        }

        #v3 .arch-item {
            display: grid;
            grid-template-columns: 1fr 200px;
            align-items: start;
            padding: 0;
            border-bottom: 1px solid var(--rule);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: background .2s ease, transform .2s ease, border-color .2s ease, box-shadow .2s ease;
            border-radius: 8px;
            margin-bottom: 4px;
        }

        #v3 .arch-item:hover {
            background: var(--warm);
            transform: scale(1.01);
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            z-index: 2;
        }

        #v3 .arch-item-center {
            padding: 28px 32px 28px clamp(24px, 6vw, 120px)
        }

        #v3 .arch-cat-strip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--ink-muted);
            margin-bottom: 10px
        }

        #v3 .arch-cat-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%
        }

        .cat-dot-visa {
            background: var(--gold)
        }

        .cat-dot-german {
            background: var(--green)
        }

        .cat-dot-ausbildung {
            background: var(--rose)
        }

        .cat-dot-story {
            background: var(--sky)
        }

            font-family: var(--cormorant);
            font-size: clamp(20px, 2vw, 28px);
            font-weight: 500;
            color: var(--ink);
            line-height: 1.2;
            transition: color .15s;
            margin-top: 5px;
        }

        #v3 .arch-item:hover .arch-item-title {
            color: var(--gold-deep)
        }

        #v3 .arch-excerpt {
            font-size: 12px;
            color: var(--ink-muted);
            line-height: 1.6;
            margin-top: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        #v3 .arch-item-right {
            padding: 28px clamp(24px, 6vw, 120px) 28px 0;
            text-align: right;
            align-self: center
        }

        #v3 .arch-date {
            font-size: 11px;
            color: var(--ink-muted);
            margin-bottom: 4px
        }

            font-family: var(--cormorant);
            font-size: 14px;
            font-style: italic;
            color: var(--gold-deep)

            display: block;
            font-size: 18px;
            color: var(--ink-muted);
            margin-top: 8px;
            transition: transform .3s ease-out, color .3s ease-out;
        }

        #v3 .arch-item:hover .arch-read-arrow {
            transform: translateX(10px);
            color: var(--gold-deep)
        }

            #v3 .arch-item {
                grid-template-columns: 1fr
            }

            #v3 .arch-item-right {
                display: none
            }

            flex-wrap: wrap;
        }

            font-size: 12px;
            font-weight: 600;

            background: var(--ink);
            color: var(--cream);
        }

        /* Modal Styles */
        #post-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(31, 27, 22, 0.9);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #f8f4ed;
            width: 90%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 40px;
            position: relative;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            font-family: 'DM Sans', sans-serif;

            right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: var(--ink);
            background: none;
            border: none;

        function initBlog() {
            const countEl = document.getElementById('total-blogs-count');
            if (countEl) {
                countEl.innerText = `Total Posts: ${blogPosts.length}`;
            }
            renderPosts();
        }

        // Render posts based on filters
        function renderPosts(searchQuery = '', category = 'All') {
            blogGrid.innerHTML = '';

            const filtered = blogPosts.filter(post => {
                const matchesSearch = post.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    post.excerpt.toLowerCase().includes(searchQuery.toLowerCase());
                const matchesCategory = category === 'All' || post.category === category;
                return matchesSearch && matchesCategory;
            });

            if (filtered.length === 0) {
                blogGrid.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; color: var(--ink-muted);">No posts found.</p>';
                return;
            }

            filtered.forEach((post, index) => {
                const col = document.createElement('div');
                col.className = 'arch-item';
                col.onclick = () => window.location.href = './blogs/' + post.file;

                let dotClass = 'cat-dot-visa';
                if (post.category === 'Tech') dotClass = 'cat-dot-german';
                else if (post.category === 'DevOps') dotClass = 'cat-dot-ausbildung';
                else if (post.category === 'Databases') dotClass = 'cat-dot-story';

                const isFeatured = post.featured ? '⭐ ' : '';
                col.innerHTML = `
                        <div class="arch-item-center">
                            <div class="arch-cat-strip"><span class="arch-cat-dot ${dotClass}"></span>${post.category}</div>
                            <h3 class="arch-item-title"><a href="./blogs/${post.file}" style="text-decoration:none; color:inherit;">${isFeatured}${post.title}</a></h3>
                            <p class="arch-excerpt">${post.excerpt}</p>
                        </div>
                        <div class="arch-item-right">
                            <div class="arch-date">${post.date || '03 June 2026'}</div>
                            <div class="arch-readtime">${post.readTime}</div>
                            <span class="arch-read-arrow">→</span>
                        </div>
                    `;
                blogGrid.appendChild(col);
            });
        }

        // Event Listeners for Search and Categories
        searchInput.addEventListener('input', (e) => {
            const activeCategory = document.querySelector('.cat-tag.active').dataset.category;
            renderPosts(e.target.value, activeCategory);
        });

        categoryButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                categoryButtons.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                renderPosts(searchInput.value, e.target.dataset.category);
            });
        });

        // Set Date
        const today = new Date();
        // document.getElementById('current-date').innerText = 'Issue No. 1 · ' + today.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

        // Initial Render
        initBlog();
    </script>
