<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.M. Rinas | Blog</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./files/style.css">
    <link rel="stylesheet" href="./files/cyber-theme.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        /* V3 — PURE TYPOGRAPHY ARCHIVE */
        :root{
            --cream:#faf7f2;--warm:#f1ece3;--paper:#ece8e0;
            --ink:#1f1b16;--ink-soft:#3b342c;--ink-muted:#6f685e;
            --green:#1b4332;--green-soft:#2d5a47;--green-pale:#e8f0eb;
            --gold:#b8895a;--gold-deep:#8a6440;--gold-light:#f5ede0;
            --rose:#8b3a2a;--rose-pale:#f5e8e5;
            --sky:#1a3a5c;--sky-pale:#e5edf5;
            --rule:rgba(31,27,22,.1);--rule-strong:rgba(31,27,22,.2);
            --cormorant:'Cormorant Garamond',Georgia,serif;
            --playfair:'Playfair Display',Georgia,serif;
            --dm:'DM Sans',system-ui,sans-serif;
            --ease-out:cubic-bezier(0.16,1,0.3,1);
        }
        #v3 {
            margin-top: 100px;
            background: var(--cream);
            font-family: 'DM Sans', sans-serif;
            color: var(--ink);
        }
        #v3 .demo{background:var(--cream)}
        #v3 .arch-header{padding:80px clamp(24px,6vw,120px) 60px;border-bottom:2px solid var(--ink);max-width:1200px;margin: 0 auto;}
        #v3 .arch-meta-row{display:flex;align-items:baseline;justify-content:space-between;gap:24px;flex-wrap:wrap;margin-bottom:24px}
        #v3 .arch-title{font-family:var(--cormorant);font-size:clamp(48px,7vw,96px);font-weight:300;color:var(--ink);letter-spacing:-.02em;line-height:1}
        #v3 .arch-sub{font-size:12px;color:var(--ink-muted);line-height:1.6;max-width:320px;text-align:right}
        #v3 .arch-search{display:flex;align-items:center;border:1px solid var(--rule-strong);max-width:360px;margin-top:32px; border-radius: 20px;}
        #v3 .arch-search input{flex:1;padding:12px 16px;font-family:var(--dm);font-size:13px;color:var(--ink);background:transparent;border:none;outline:none}
        #v3 .arch-search input::placeholder{color:var(--ink-muted)}
        #v3 .arch-search-icon{padding:12px 16px;color:var(--ink-muted)}
        
        /* Archive list */
        #v3 .arch-list{max-width:1200px; margin: 0 auto; padding-bottom: 80px;}
        #v3 .arch-item{display:grid;grid-template-columns:56px 1fr 200px;align-items:start;padding:0;border-bottom:1px solid var(--rule);cursor:pointer;position:relative;overflow:hidden;transition:background .15s}
        #v3 .arch-item:hover{background:var(--warm)}
        #v3 .arch-item-num{font-family:var(--cormorant);font-size:13px;color:var(--ink-muted);padding:28px 0 28px clamp(24px,6vw,120px);letter-spacing:.1em;align-self:center}
        #v3 .arch-item-center{padding:28px 32px 28px 0}
        #v3 .arch-cat-strip{display:inline-flex;align-items:center;gap:6px;font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:10px}
        #v3 .arch-cat-dot{width:6px;height:6px;border-radius:50%}
        .cat-dot-visa{background:var(--gold)}
        .cat-dot-german{background:var(--green)}
        .cat-dot-ausbildung{background:var(--rose)}
        .cat-dot-story{background:var(--sky)}
        #v3 .arch-item-title{font-family:var(--cormorant);font-size:clamp(20px,2vw,28px);font-weight:500;color:var(--ink);line-height:1.2;transition:color .15s; margin-top: 5px;}
        #v3 .arch-item:hover .arch-item-title{color:var(--gold-deep)}
        #v3 .arch-excerpt{font-size:12px;color:var(--ink-muted);line-height:1.6;max-height:0;overflow:hidden;transition:max-height .4s var(--ease-out),opacity .3s;opacity:0;margin-top:0}
        #v3 .arch-item:hover .arch-excerpt{max-height:80px;opacity:1;margin-top:10px}
        #v3 .arch-item-right{padding:28px clamp(24px,6vw,120px) 28px 0;text-align:right;align-self:center}
        #v3 .arch-date{font-size:11px;color:var(--ink-muted);margin-bottom:4px}
        #v3 .arch-readtime{font-family:var(--cormorant);font-size:14px;font-style:italic;color:var(--gold-deep)}
        #v3 .arch-read-arrow{display:block;font-size:18px;color:var(--ink-muted);margin-top:8px;transition:transform .2s,color .2s}
        #v3 .arch-item:hover .arch-read-arrow{transform:translateX(6px);color:var(--gold-deep)}
        @media(max-width:700px){#v3 .arch-item{grid-template-columns:40px 1fr}#v3 .arch-item-right{display:none}}

            .category-tags {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
            }
            .cat-tag {
                padding: 6px 12px;
                border: 1px solid var(--ink);
                border-radius: 20px;
                font-size: 12px;
                font-weight: 600;
                cursor: pointer;
                background: transparent;
                color: var(--ink);
                transition: all 0.2s ease;
                text-transform: uppercase;
                letter-spacing: 0.1em;
            }
            .cat-tag.active, .cat-tag:hover {
                background: var(--ink);
                color: var(--cream);
            }

            /* Modal Styles */
            #post-modal {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(31,27,22,0.9);
                z-index: 1000;
                display: none;
                justify-content: center;
                align-items: center;
                backdrop-filter: blur(5px);
            }
            .modal-content {
                background: #f8f4ed;
                width: 90%;
                max-width: 900px;
                max-height: 90vh;
                overflow-y: auto;
                padding: 40px;
                position: relative;
                border-radius: 10px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.5);
                font-family: 'DM Sans', sans-serif;
            }
            .close-btn {
                position: absolute;
                top: 20px;
                right: 20px;
                font-size: 30px;
                cursor: pointer;
                color: var(--ink);
                background: none;
                border: none;
            }
            .markdown-body {
                color: var(--ink);
                line-height: 1.6;
            }
            .markdown-body h1, .markdown-body h2, .markdown-body h3 {
                font-family: var(--playfair);
                margin-top: 1.5em;
                margin-bottom: 0.5em;
                color: var(--ink);
            }
            .markdown-body pre {
                background: var(--ink);
                color: var(--cream);
                padding: 15px;
                border-radius: 5px;
                overflow-x: auto;
            }
            .markdown-body code {
                font-family: monospace;
                background: rgba(0,0,0,0.05);
                padding: 2px 4px;
                border-radius: 3px;
            }
            .markdown-body pre code {
                background: transparent;
                padding: 0;
            }
            .markdown-body img {
                max-width: 100%;
                height: auto;
                border-radius: 5px;
                margin: 20px 0;
            }
            .markdown-body a {
                color: var(--gold-deep);
                text-decoration: none;
            }
            .markdown-body a:hover {
                text-decoration: underline;
            }
        </style>
        
        <!-- Marked.js for Markdown parsing -->
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    </head>
    <body>

        <!-- ===== NAVBAR ===== -->
        <header class="header">
            <a href="index.html" class="logo" style="opacity: 1;">Portfolio</a>
            <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
            <nav class="navbar" id="myLinks">
                <a href="index.html" style="--i:1; opacity: 1;">Home</a>
                <a href="blog.html" style="--i:2; opacity: 1;" class="active">Blog</a>
            </nav>
        </header>

        <div id="v3">
            <div class="demo">
                <div class="arch-header">
                    <div class="arch-meta-row">
                        <h2 class="arch-title">Insights<br>&amp; Guides</h2>
                        <p class="arch-sub">Research, guides, and honest advice. New posts published regularly.</p>
                    </div>
                    
                    <div class="category-tags" id="category-container" style="margin-bottom: 20px; margin-top: 10px;">
                        <button class="cat-tag active" data-category="All">All</button>
                        <button class="cat-tag" data-category="Tech">Tech</button>
                        <button class="cat-tag" data-category="DevOps">DevOps</button>
                        <button class="cat-tag" data-category="Frontend">Frontend</button>
                        <button class="cat-tag" data-category="Backend">Backend</button>
                        <button class="cat-tag" data-category="AI">AI</button>
                        <button class="cat-tag" data-category="Databases">Databases</button>
                    </div>

                    <div class="arch-search">
                        <input type="text" id="search-input" placeholder="Search the archive...">
                        <span class="arch-search-icon">
                            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/><path d="M10 10l3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                        </span>
                    </div>
                </div>

                <div class="arch-list" id="blog-grid">
                    <!-- JS injected content goes here -->
                </div>
            </div>
        </div>

        <!-- Blog Post Modal -->
        <div id="post-modal">
            <div class="modal-content">
                <button class="close-btn" id="close-modal">&times;</button>
                <div id="modal-body" class="markdown-body">
                    <!-- Markdown content goes here -->
                </div>
            </div>
        </div>

        <script>
            const blogGrid = document.getElementById('blog-grid');
            const searchInput = document.getElementById('search-input');
            const categoryButtons = document.querySelectorAll('.cat-tag');
            const postModal = document.getElementById('post-modal');
            const modalBody = document.getElementById('modal-body');
            const closeModal = document.getElementById('close-modal');

            // Add your blog posts here manually. This ensures it works perfectly locally and on GitHub Pages!
            const blogPosts = [
                {
                    title: "Introduction: Overview of Grafana, Prometheus, and Node Exporter",
                    category: "DevOps",
                    excerpt: "An overview and installation guide for Grafana, Prometheus, and Node Exporter on Ubuntu.",
                    author: "A.M.Rinas",
                    readTime: "5 min",
                    date: "03 June 2026",
                    file: "grafana-prometheus-node-exporter.html"
                },
                {
                    title: "Grafana Installation on Ubuntu using Docker",
                    category: "DevOps",
                    excerpt: "A guide on installing Grafana OSS on Ubuntu using Docker.",
                    author: "A.M.Rinas",
                    readTime: "5 min",
                    date: "03 June 2026",
                    file: "grafana-installation-docker.html"
                },
                {
                    title: "Essential SQL Queries for Database Exploration and Management",
                    category: "Databases",
                    excerpt: "A guide on essential SQL queries used for database exploration and management.",
                    author: "A.M.Rinas",
                    readTime: "5 min",
                    date: "03 June 2026",
                    file: "essential-sql-queries.html"
                },
                {
                    title: "How to Create a Docker Network",
                    category: "DevOps",
                    excerpt: "A guide on creating Docker networks to allow containers to communicate securely.",
                    author: "A.M.Rinas",
                    readTime: "4 min",
                    date: "03 June 2026",
                    file: "docker-network-guide.html"
                },
                {
                    title: "How to Install and Use Katalon Studio for Web Testing",
                    category: "Tech",
                    excerpt: "A step-by-step guide to installing Katalon Studio and creating your first web test.",
                    author: "A.M.Rinas",
                    readTime: "6 min",
                    date: "03 June 2026",
                    file: "katalon-studio-guide.html"
                },
                {
                    title: "MySQL General Log Setup and Monitoring",
                    category: "Databases",
                    excerpt: "A comprehensive guide to enabling and monitoring the MySQL general log on a Linux system.",
                    author: "A.M.Rinas",
                    readTime: "5 min",
                    date: "03 June 2026",
                    file: "mysql-general-log.html"
                }
            ];

            function initBlog() {
                renderPosts();
            }

            // Render posts based on filters
            function renderPosts(searchQuery = '', category = 'All') {
                blogGrid.innerHTML = '';
                
                const filtered = blogPosts.filter(post => {
                    const matchesSearch = post.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                          post.excerpt.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesCategory = category === 'All' || post.category === category;
                    return matchesSearch && matchesCategory;
                });

                if (filtered.length === 0) {
                    blogGrid.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; color: var(--ink-muted);">No posts found.</p>';
                    return;
                }

                filtered.forEach((post, index) => {
                    const col = document.createElement('div');
                    col.className = 'arch-item';
                    col.onclick = () => openPost(post.file);
                    
                    let dotClass = 'cat-dot-visa';
                    if (post.category === 'Tech') dotClass = 'cat-dot-german';
                    else if (post.category === 'DevOps') dotClass = 'cat-dot-ausbildung';
                    else if (post.category === 'Databases') dotClass = 'cat-dot-story';
                    
                    col.innerHTML = `
                        <span class="arch-item-num">${String(index + 1).padStart(2, '0')}</span>
                        <div class="arch-item-center">
                            <div class="arch-cat-strip"><span class="arch-cat-dot ${dotClass}"></span>${post.category}</div>
                            <h3 class="arch-item-title">${post.title}</h3>
                            <p class="arch-excerpt">${post.excerpt}</p>
                        </div>
                        <div class="arch-item-right">
                            <div class="arch-date">${post.date || '03 June 2026'}</div>
                            <div class="arch-readtime">${post.readTime}</div>
                            <span class="arch-read-arrow">→</span>
                        </div>
                    `;
                    blogGrid.appendChild(col);
                });
            }

            // Open Modal and Fetch HTML
            async function openPost(filename) {
                modalBody.innerHTML = '<p>Loading...</p>';
                postModal.style.display = 'flex';
                
                try {
                    const response = await fetch('./blogs/' + filename);
                    if (!response.ok) throw new Error('Post not found');
                    const htmlText = await response.text();
                    
                    // Directly render the HTML content
                    modalBody.innerHTML = htmlText;
                } catch (error) {
                    modalBody.innerHTML = `<h2>Error</h2><p>Could not load the blog post. Make sure <b>${filename}</b> exists in the <i>blogs/</i> folder.</p>`;
                }
            }

            // Close Modal
            closeModal.addEventListener('click', () => {
                postModal.style.display = 'none';
                modalBody.innerHTML = '';
            });

            // Close on outside click
            postModal.addEventListener('click', (e) => {
                if (e.target === postModal) {
                    postModal.style.display = 'none';
                    modalBody.innerHTML = '';
                }
            });

            // Event Listeners for Search and Categories
            searchInput.addEventListener('input', (e) => {
                const activeCategory = document.querySelector('.cat-tag.active').dataset.category;
                renderPosts(e.target.value, activeCategory);
            });

            categoryButtons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    categoryButtons.forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    renderPosts(searchInput.value, e.target.dataset.category);
                });
            });

            // Set Date
            const today = new Date();
            // document.getElementById('current-date').innerText = 'Issue No. 1 · ' + today.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

            // Initial Render
            initBlog();
        </script>
    </body>
</html>
