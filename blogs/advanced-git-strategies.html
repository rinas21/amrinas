<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="author" content="Mohomad Rinas">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Git Strategies | A.M. Rinas Blog</title>
    
    <meta name="description" content="Explore advanced Git strategies, including rebasing, bisecting, and using the reflog.">
    <meta name="keywords" content="git, version control, devops">
    <meta name="author" content="A.M. Rinas">
    <meta name="robots" content="index, follow">
    
    <link rel="stylesheet" href="../files/style.css">
    <link rel="stylesheet" href="../files/cyber-theme.css">
    <link rel="stylesheet" href="../files/blog.css">

<style>
  /* Global Theme Switcher CSS */
  :root {
    --background: #ffffff;
    --foreground: #0d0d0d;
    --theme-accent: #4338ca;
    --transition-speed: 0.6s;
    --bg: var(--background);
    --text: var(--foreground);
    --ink: var(--foreground);
    --rule: var(--theme-accent);
  }
  html[data-theme="dark"] {
    --background: #111111;
    --foreground: #f5f5f5;
    --theme-accent: #ccff00;
    --bg: var(--background);
    --text: var(--foreground);
    --ink: var(--foreground);
    --rule: var(--theme-accent);
  }
  html[data-theme="luxury"] {
    --background: #05050a;
    --foreground: #e0e0ff;
    --theme-accent: #ff0055;
    --bg: var(--background);
    --text: var(--foreground);
    --ink: var(--foreground);
    --rule: var(--theme-accent);
  }

  body {
    background-color: var(--background) !important;
    color: var(--foreground) !important;
    transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
  }

  .theme-switcher-container {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 12px;
    z-index: 9999;
  }

  .theme-btn {
    position: relative;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1px solid transparent;
    cursor: pointer;
    overflow: hidden;
    padding: 0;
    transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    background: transparent;
  }

  .theme-btn.active {
    border-color: rgba(128, 128, 128, 0.5);
    transform: scale(1.15);
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    z-index: 10;
  }

  .theme-btn:not(.active):hover {
    transform: scale(1.1);
  }

  .theme-bg-preview {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  .theme-accent-preview {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 60%;
    height: 60%;
    border-radius: 50%;
    transform: translate(15%, 15%);
    z-index: 2;
    pointer-events: none;
  }
</style>

</head>
<body>
    <!-- Mohomad Rinas -->
    <header class="header">
        <a href="../index.html" class="logo" style="opacity: 1; color: var(--ink);">Portfolio</a>
        <nav class="navbar">
            <a href="../index.html" style="color: var(--ink);">Home</a>
            <a href="../blog.html" style="color: var(--ink);">Blog</a>
        </nav>
    </header>

    <article class="blog-post-container">
        <h1>Advanced Git Strategies</h1>
        <p>Explore advanced Git strategies, including rebasing, bisecting, and using the reflog.</p>
        <h2>Git Reflog</h2>
        <p>The git reflog command allows you to view the history of your HEAD and branches, enabling you to recover lost commits.</p>
        <hr style="margin: 40px 0; border: none; border-top: 1px solid var(--rule);">
        <p style="font-size: 14px; font-style: italic; color: var(--ink-muted); text-align: right;">
          Written by <strong>A.M. Rinas</strong>
        </p>
    </article>

  <!-- Theme Switcher UI -->
  <div class="theme-switcher-container" id="themeSwitcher"></div>

  <script>
    const THEMES = [
      { id: "default", label: "Studio Light", color: "#4338CA", bg: "#FFFFFF" },
      { id: "dark", label: "Neo Dark", color: "#CCFF00", bg: "#111111" },
      { id: "luxury", label: "Cyber Pink", color: "#FF0055", bg: "#05050A" }
    ];

    let currentTheme = localStorage.getItem('selected_theme') || "default";
    const container = document.getElementById("themeSwitcher");

    function setTheme(themeId) {
      currentTheme = themeId;
      document.documentElement.setAttribute("data-theme", themeId);
      localStorage.setItem('selected_theme', themeId);
      
      document.querySelectorAll(".theme-btn").forEach(btn => {
        if (btn.dataset.theme === themeId) {
          btn.classList.add("active");
        } else {
          btn.classList.remove("active");
        }
      });
    }

    if(container) {
      THEMES.forEach(theme => {
        const btn = document.createElement("button");
        btn.className = `theme-btn ${theme.id === currentTheme ? 'active' : ''}`;
        btn.dataset.theme = theme.id;
        btn.title = theme.label;
        
        const bgPreview = document.createElement("div");
        bgPreview.className = "theme-bg-preview";
        bgPreview.style.backgroundColor = theme.bg;
        
        const accentPreview = document.createElement("div");
        accentPreview.className = "theme-accent-preview";
        accentPreview.style.backgroundColor = theme.color;

        btn.appendChild(bgPreview);
        btn.appendChild(accentPreview);

        btn.addEventListener("click", () => setTheme(theme.id));
        container.appendChild(btn);
      });
      // Initialize on load
      setTheme(currentTheme);
    }
  </script>

</body>
</html>
